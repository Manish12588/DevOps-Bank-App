apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: devops-bank

spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
        - name: backend
          image: YOUR_DOCKERHUB_USERNAME/devops-bank-app-backend:fcdd95338c14dddae96c17803dceee252ab17a48
          ports:
            - containerPort: 3000

          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: devops-bank-config
                  key: DB_HOST

            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: devops-bank-config
                  key: DB_PORT

            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: devops-bank-config
                  key: DB_NAME

            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: devops-bank-secret
                  key: DB_USER

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: devops-bank-secret
                  key: DB_PASSWORD

            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: devops-bank-config
                  key: PORT

            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: devops-bank-config
                  key: NODE_ENV

            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: devops-bank-secret
                  key: JWT_SECRET

            - name: OLLAMA_HOST
              valueFrom:
                configMapKeyRef:
                  name: devops-bank-config
                  key: OLLAMA_HOST

            - name: OLLAMA_MODEL
              valueFrom:
                configMapKeyRef:
                  name: devops-bank-config
                  key: OLLAMA_MODEL

          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"

          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 5