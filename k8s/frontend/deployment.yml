apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: devops-bank

spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  
  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
        - name: frontend
          image: manish12588/devops-bank-app-frontend:fcdd95338c14dddae96c17803dceee252ab17a48
          ports:
            - containerPort: 80

          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"

          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5