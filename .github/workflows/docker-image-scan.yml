# Uses Trivy image scanner for CVEs - single image
name: Image Scanner

on:
  workflow_call:

jobs:
  image-scanner:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull App Image from Docker Hub
        run: docker pull ${{ secrets.DOCKERHUB_USERNAME }}/devops-bank-app:${{ github.sha }}

      - name: Trivy Scanner — App Image
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/devops-bank-app:${{ github.sha }}
          severity: 'CRITICAL,HIGH'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          trivyignores: .trivyignore

      - name: Trivy SARIF — App Image
        if: always()
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/devops-bank-app:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          exit-code: '0'