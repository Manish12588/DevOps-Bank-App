# Linting and SAST (Static Application Security Testing) scan
# Lint - ESLint (Equivalent to flake8)
# SAST - njsscan (Equivalent to Bandit)

name: Code Quality

on:    
    workflow_dispatch:
    #workflow_call:
      

jobs:
  validate:
    name: Lint and SAST Scan
    runs-on: ubuntu-latest
   
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "./backend/package.json"

      # Install Python to run the SAST scanner (njsscan)
      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Dependencies
        working-directory: ./backend
        run: npm install

      # 1. LINT: Checks for syntax and style errors in your JS files
      - name: Run ESLint
        working-directory: ./backend 
        run: npm run lint

      # 2. SAST: Scans your actual code for security flaws (like Bandit)
      - name: Run njsscan (Static Analysis)
        run: |
          pip install njsscan
          njsscan ./backend