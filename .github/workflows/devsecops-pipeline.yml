name: DevSecOps End To End Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'app/backend/**'
      - 'app/frontend/**'
      - 'app/database/**'
      - 'docker-compose.yml'
  workflow_dispatch:
  workflow_run:
    workflows: ["Infrastructure Pipeline"]
    types:
      - completed
    branches:
      - main

jobs:
  code-quality:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name != 'workflow_run' }}
    uses: ./.github/workflows/code-quality-check.yml

  secrets-scan:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name != 'workflow_run' }}
    uses: ./.github/workflows/secrets-scan.yml
    secrets: inherit

  dependency-scan:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name != 'workflow_run' }}
    uses: ./.github/workflows/dependency-scan.yml

  docker-scan:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name != 'workflow_run' }}
    uses: ./.github/workflows/docker-lint.yml

  build:
    needs: [code-quality, secrets-scan, dependency-scan, docker-scan]
    permissions:
      contents: write
    uses: ./.github/workflows/docker-build-and-push.yml
    secrets: inherit

  trivy:
    needs: [build]
    uses: ./.github/workflows/docker-image-scan.yml
    secrets: inherit
    
