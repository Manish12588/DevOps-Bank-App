name: DevSecOps End To End Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'app/backend/**'
      - 'app/frontend/**'
      - 'app/database/**'
      - 'docker-compose.yml'
  workflow_dispatch:
    inputs:
      deploy_ec2:
        description: 'Deploy to EC2 server'
        required: true
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  code-quality:
    uses: ./.github/workflows/code-quality-check.yml

  secrets-scan:
    uses: ./.github/workflows/secrets-scan.yml
    secrets: inherit

  dependency-scan:
    uses: ./.github/workflows/dependency-scan.yml

  docker-scan:
    uses: ./.github/workflows/docker-lint.yml

  build:
    needs: [code-quality, secrets-scan, dependency-scan, docker-scan]
    permissions:
      contents: write
    uses: ./.github/workflows/docker-build-and-push.yml
    secrets: inherit

  trivy:
    needs: [build]
    uses: ./.github/workflows/docker-image-scan.yml
    secrets: inherit

  deploy-eks:
    needs: [trivy]
    uses: ./.github/workflows/deploy-eks.yml
    secrets: inherit

  deploy-ec2:
    needs: [trivy]
    if: ${{ github.event.inputs.deploy_ec2 == 'true' }}
    uses: ./.github/workflows/deploy-ec2.yml
    secrets: inherit