# ── Observability Stack ───────────────────────────────────────────────────────
# Installs Prometheus, Grafana, Loki, Promtail on EKS
# Triggered manually

name: Install Observability Stack

on:
  workflow_dispatch:

jobs:
  install-observability:
    name: Install Monitoring Stack
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig \
            --region ${{ vars.AWS_REGION }} \
            --name ${{ vars.EKS_CLUSTER_NAME }}

      - name: Install Helm
        run: |
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Add Helm repositories
        run: |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo add grafana https://grafana.github.io/helm-charts
          helm repo update

      - name: Create monitoring namespace
        run: |
          kubectl apply -f k8s/monitoring/namespace.yml

      - name: Install Prometheus + Grafana
        run: |
          helm upgrade --install prometheus \
            prometheus-community/kube-prometheus-stack \
            --namespace monitoring \
            --values helm/values/prometheus-values.yml \
            --set grafana.adminPassword=${{ secrets.GRAFANA_PASSWORD }} \
            --wait \
            --timeout 10m

      - name: Install Loki + Promtail
        run: |
          helm upgrade --install loki \
            grafana/loki-stack \
            --namespace monitoring \
            --values helm/values/loki-values.yml \
            --wait \
            --timeout 10m
      
      # ── Configure Grafana Datasources
      - name: Configure Grafana Datasources
        run: |
          echo "Waiting for Grafana LoadBalancer..."
          sleep 60

          GRAFANA_URL=$(kubectl get svc prometheus-grafana \
            -n monitoring \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')

          echo "Grafana URL: http://${GRAFANA_URL}"

          # Add Prometheus datasource
          curl -s -X POST \
            -H "Content-Type: application/json" \
            -u admin:${{ secrets.GRAFANA_PASSWORD }} \
            http://${GRAFANA_URL}/api/datasources \
            -d '{
              "name": "Prometheus",
              "type": "prometheus",
              "url": "http://prometheus-kube-prometheus-prometheus:9090",
              "access": "proxy",
              "isDefault": true
            }' && echo "Prometheus datasource added" || echo "Prometheus datasource may already exist"

          # Add Loki datasource
          curl -s -X POST \
            -H "Content-Type: application/json" \
            -u admin:${{ secrets.GRAFANA_PASSWORD }} \
            http://${GRAFANA_URL}/api/datasources \
            -d '{
              "name": "Loki",
              "type": "loki",
              "url": "http://loki:3100",
              "access": "proxy",
              "isDefault": false
            }' && echo "Loki datasource added" || echo "Loki datasource may already exist"

          echo "Datasources configured"

      # ── Metrics Server
      - name: Install Metrics Server
        run: |
          kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
          kubectl wait --for=condition=Ready pods \
            -l k8s-app=metrics-server \
            -n kube-system \
            --timeout=120s
          echo "Metrics Server ready"

      - name: Get Grafana URL
        run: |
          echo "Waiting for Grafana LoadBalancer..."
          sleep 30
          GRAFANA_URL=$(kubectl get svc prometheus-grafana \
            -n monitoring \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          echo "=========================================="
          echo "  Observability Stack Ready"
          echo "=========================================="
          echo ""
          echo "📋 VALIDATE YOUR OBSERVABILITY:"
          echo ""
          echo "1. Check all monitoring pods:"
          echo "   kubectl get pods -n monitoring"
          echo ""
          echo "2. Check Prometheus targets:"
          echo "   kubectl port-forward svc/prometheus-kube-prometheus-prometheus -n monitoring 9090:9090"
          echo "   Open: http://localhost:9090/targets"
          echo ""
          echo "3. Check Loki logs:"
          echo "   kubectl logs -l app=loki -n monitoring --tail=20"
          echo ""
          echo "4. Check Metrics Server:"
          echo "   kubectl top nodes"
          echo "   kubectl top pods -n devops-bank"
          echo ""
          echo "5. Grafana Datasources:"
          echo "   Connections → Data sources → Prometheus + Loki"
          echo ""
          echo "6. Recommended Dashboards:"
          echo "   Dashboards → Kubernetes / Compute Resources / Cluster"
          echo "   Dashboards → Kubernetes / Compute Resources / Namespace (Pods)"
          echo ""
          echo "=========================================="
          echo "  Grafana URL:  http://${GRAFANA_URL}"
          echo "  Username:     admin"
          echo "  Password:     (from GRAFANA_PASSWORD secret)"
          echo "=========================================="
