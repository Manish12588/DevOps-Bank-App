name: Docker Build and Push

on:
  workflow_call:

jobs:
  docker-build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── Single image built from repo root Dockerfile ──────────────────────────
      # The same image runs as frontend (Nginx) OR backend (Node.js)
      # based on the ROLE env var set in docker-compose.yml
      - name: Build and Push Single App Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-bank-app:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-bank-app:${{ github.sha }}