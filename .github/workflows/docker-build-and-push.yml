name: Docker Build and Push

on:
  workflow_call:

jobs:
  docker-build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── Backend ──────────────────────────────────────────────────────────────
      - name: Build and Push Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./app/backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-bank-app-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-bank-app-backend:${{ github.sha }}

      # ── Frontend ─────────────────────────────────────────────────────────────
      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: ./app/frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-bank-app-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-bank-app-frontend:${{ github.sha }}

       # ── Update K8s manifests with new image tags ──────────────────────────────
      - name: Update image tags in K8s manifests
        run: |
          sed -i "s|image: ${{ secrets.DOCKERHUB_USERNAME }}/devops-bank-app-backend:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/devops-bank-app-backend:${{ github.sha }}|" k8s/backend/deployment.yml
          sed -i "s|image: ${{ secrets.DOCKERHUB_USERNAME }}/devops-bank-app-frontend:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/devops-bank-app-frontend:${{ github.sha }}|" k8s/frontend/deployment.yml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/backend/deployment.yml k8s/frontend/deployment.yml
          git commit -m "deploy: update image tags to ${{ github.sha }}"
          git push