# API Keys, sensitive data, credentials 
# GitLeaks
name: Secrets Scan

on:
    #workflow_call:
    workflow_dispatch:

jobs:
    secrets-scan:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v5
              with:
                fetch-depth: 0

            #- name: Run GitLeaks Scanner
            #  uses: gitleaks/gitleaks-action@v2
            #  env:
            #    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # gitHub actions manages it

            # Install gitleaks CLI directly — no Node.js action involved at all
            - name: Install Gitleaks
              run: |
                curl -sSfL https://raw.githubusercontent.com/gitleaks/gitleaks/master/scripts/install.sh \
                  | sh -s -- -b /usr/local/bin
                echo "/usr/local/bin" >> $GITHUB_PATH

            - name: Run Gitleaks
              run: gitleaks detect --source . --verbose