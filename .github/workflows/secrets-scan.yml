# API Keys, sensitive data, credentials 
# GitLeaks
name: Secrets Scan

on:
    #workflow_call:
    workflow_dispatch:

jobs:
    secrets-scan:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v5
              with:
                fetch-depth: 0

            #- name: Run GitLeaks Scanner
            #  uses: gitleaks/gitleaks-action@v2
            #  env:
            #    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # gitHub actions manages it

            # Install gitleaks CLI directly — no Node.js action involved at all
            - name: Install and Run Gitleaks
              run: |
                curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v8.30.0/gitleaks_8.30.0_linux_x64.tar.gz" \
                -o gitleaks.tar.gz
                tar -xzf gitleaks.tar.gz gitleaks
                sudo mv gitleaks /usr/local/bin/
                gitleaks detect --source . --verbose