<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — DevOps Bank</title>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #0a0f1e;
      --surface: #111827;
      --surface2: #1a2236;
      --border: #1f2d45;
      --accent: #3b82f6;
      --accent2: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --text: #e2e8f0;
      --muted: #64748b;
      --gold: #fbbf24;
      --purple: #8b5cf6;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      /* Subtle grid background */
      background-image:
        linear-gradient(rgba(59, 130, 246, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59, 130, 246, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    /* Glow orbs */
    body::before,
    body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      width: 400px;
      height: 400px;
      background: rgba(59, 130, 246, 0.06);
      top: -100px;
      left: -100px;
    }

    body::after {
      width: 300px;
      height: 300px;
      background: rgba(16, 185, 129, 0.05);
      bottom: -50px;
      right: -50px;
    }

    .auth-container {
      width: 100%;
      max-width: 440px;
      position: relative;
      z-index: 1;
    }

    /* Logo */
    .logo {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 2rem;
      justify-content: center;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: var(--accent);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .logo-name {
      font-family: 'DM Serif Display', serif;
      font-size: 1.5rem;
      color: #fff;
      letter-spacing: -0.5px;
    }

    .logo-badge {
      font-size: 0.6rem;
      background: var(--accent);
      color: #fff;
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: 600;
      letter-spacing: 1px;
      margin-left: 4px;
      vertical-align: middle;
    }

    /* Card */
    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
    }

    .auth-header {
      margin-bottom: 1.75rem;
      text-align: center;
    }

    .auth-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.6rem;
      color: #fff;
      margin-bottom: 0.25rem;
    }

    .auth-sub {
      font-size: 0.83rem;
      color: var(--muted);
    }

    /* Form */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      margin-bottom: 1rem;
    }

    label {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .input-wrapper {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 0.9rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.9rem;
      pointer-events: none;
    }

    input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 0.65rem 0.9rem 0.65rem 2.4rem;
      font-size: 0.9rem;
      font-family: inherit;
      outline: none;
      transition: border 0.2s, box-shadow 0.2s;
      width: 100%;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    input.error {
      border-color: var(--danger);
    }

    /* Password strength */
    .strength-bar {
      height: 3px;
      border-radius: 2px;
      background: var(--border);
      margin-top: 0.4rem;
      overflow: hidden;
    }

    .strength-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.3s, background 0.3s;
      width: 0%;
    }

    .strength-label {
      font-size: 0.72rem;
      margin-top: 0.25rem;
      color: var(--muted);
    }

    /* Field error */
    .field-error {
      font-size: 0.75rem;
      color: var(--danger);
      margin-top: 0.2rem;
      display: none;
    }

    .field-error.show {
      display: block;
    }

    /* Alert */
    .alert {
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      display: none;
    }

    .alert.show {
      display: block;
    }

    .alert.success {
      background: rgba(16, 185, 129, 0.15);
      border: 1px solid var(--accent2);
      color: var(--accent2);
    }

    .alert.error {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid var(--danger);
      color: var(--danger);
    }

    /* Submit button */
    .btn-submit {
      width: 100%;
      padding: 0.75rem;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.92rem;
      font-weight: 600;
      background: var(--accent);
      color: #fff;
      transition: all 0.15s;
      margin-top: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .btn-submit:hover:not(:disabled) {
      background: #2563eb;
      transform: translateY(-1px);
      box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
    }

    .btn-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* Spinner */
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 1.25rem 0;
      color: var(--muted);
      font-size: 0.78rem;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Login link */
    .auth-footer {
      text-align: center;
      margin-top: 1.25rem;
      font-size: 0.85rem;
      color: var(--muted);
    }

    .auth-footer a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }

    .auth-footer a:hover {
      text-decoration: underline;
    }

    /* Success state */
    .success-state {
      text-align: center;
      padding: 1rem 0;
      display: none;
    }

    .success-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    .success-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.4rem;
      color: var(--accent2);
      margin-bottom: 0.5rem;
    }

    .success-sub {
      color: var(--muted);
      font-size: 0.85rem;
    }

    .countdown {
      color: var(--accent);
      font-family: 'JetBrains Mono', monospace;
    }
  </style>
</head>

<body>

  <div class="auth-container">
    <div class="logo">
      <div class="logo-icon">🏦</div>
      <span class="logo-name">DevOps BANK<span class="logo-badge">DOCKER</span></span>
    </div>

    <div class="auth-card">
      <!-- Registration form -->
      <div id="formState">
        <div class="auth-header">
          <div class="auth-title">Create Account</div>
          <div class="auth-sub">Join DevOps Bank — it takes 30 seconds</div>
        </div>

        <div id="registerAlert" class="alert"></div>

        <div class="form-group">
          <label>Full Name</label>
          <div class="input-wrapper">
            <span class="input-icon">👤</span>
            <input type="text" id="fullName" placeholder="e.g. Manish Kumar" autocomplete="name">
          </div>
          <span class="field-error" id="fullNameError"></span>
        </div>

        <div class="form-group">
          <label>Email Address</label>
          <div class="input-wrapper">
            <span class="input-icon">✉️</span>
            <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
          </div>
          <span class="field-error" id="emailError"></span>
        </div>

        <div class="form-group">
          <label>Password</label>
          <div class="input-wrapper">
            <span class="input-icon">🔒</span>
            <input type="password" id="password" placeholder="Min. 8 characters" autocomplete="new-password"
              oninput="checkStrength(this.value)">
          </div>
          <div class="strength-bar">
            <div class="strength-fill" id="strengthFill"></div>
          </div>
          <div class="strength-label" id="strengthLabel">Enter a password</div>
          <span class="field-error" id="passwordError"></span>
        </div>

        <div class="form-group">
          <label>Confirm Password</label>
          <div class="input-wrapper">
            <span class="input-icon">🔒</span>
            <input type="password" id="confirmPassword" placeholder="Repeat your password" autocomplete="new-password">
          </div>
          <span class="field-error" id="confirmError"></span>
        </div>

        <button class="btn-submit" id="submitBtn" onclick="doRegister()">
          Create Account
        </button>

        <div class="divider">or</div>

        <div class="auth-footer">
          Already have an account? <a href="/login.html">Sign in</a>
        </div>
      </div>

      <!-- Success state -->
      <div class="success-state" id="successState">
        <div class="success-icon">✅</div>
        <div class="success-title">Account Created!</div>
        <div class="success-sub">
          Welcome to DevOps Bank.<br>
          Redirecting to dashboard in <span class="countdown" id="countdown">3</span>s…
        </div>
      </div>
    </div>
  </div>

  <script>
    // Password strength checker
    function checkStrength(value) {
      const fill = document.getElementById('strengthFill');
      const label = document.getElementById('strengthLabel');

      if (!value) {
        fill.style.width = '0%';
        label.textContent = 'Enter a password';
        label.style.color = 'var(--muted)';
        return;
      }

      let score = 0;
      if (value.length >= 8) score++;
      if (value.length >= 12) score++;
      if (/[A-Z]/.test(value)) score++;
      if (/[0-9]/.test(value)) score++;
      if (/[^A-Za-z0-9]/.test(value)) score++;

      const levels = [
        { pct: '20%', color: 'var(--danger)', text: 'Very weak' },
        { pct: '40%', color: 'var(--danger)', text: 'Weak' },
        { pct: '60%', color: 'var(--warning)', text: 'Fair' },
        { pct: '80%', color: 'var(--accent)', text: 'Strong' },
        { pct: '100%', color: 'var(--accent2)', text: 'Very strong' },
      ];

      const level = levels[Math.min(score - 1, 4)] || levels[0];
      fill.style.width = level.pct;
      fill.style.background = level.color;
      label.textContent = level.text;
      label.style.color = level.color;
    }

    function showFieldError(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.classList.add('show');
    }

    function clearFieldError(id) {
      document.getElementById(id).classList.remove('show');
    }

    function showAlert(msg, type) {
      const el = document.getElementById('registerAlert');
      el.textContent = msg;
      el.className = 'alert show ' + type;
    }

    function validate() {
      let valid = true;
      ['fullNameError', 'emailError', 'passwordError', 'confirmError'].forEach(clearFieldError);

      const fullName = document.getElementById('fullName').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirmPassword').value;

      if (!fullName || fullName.length < 2) {
        showFieldError('fullNameError', 'Please enter your full name (min 2 characters)');
        valid = false;
      }

      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!email || !emailRegex.test(email)) {
        showFieldError('emailError', 'Please enter a valid email address');
        valid = false;
      }

      if (!password || password.length < 8) {
        showFieldError('passwordError', 'Password must be at least 8 characters');
        valid = false;
      }

      if (password !== confirm) {
        showFieldError('confirmError', 'Passwords do not match');
        valid = false;
      }

      return valid;
    }

    async function doRegister() {
      if (!validate()) return;

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.innerHTML = '<div class="spinner"></div> Creating account…';

      const payload = {
        full_name: document.getElementById('fullName').value.trim(),
        email: document.getElementById('email').value.trim(),
        password: document.getElementById('password').value,
      };

      try {
        const r = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await r.json();

        if (!r.ok) {
          showAlert('❌ ' + data.error, 'error');
          btn.disabled = false;
          btn.innerHTML = 'Create Account';
          return;
        }

        // Store JWT token
        localStorage.setItem('bank_token', data.token);
        localStorage.setItem('bank_user', JSON.stringify(data.user));

        // Show success
        document.getElementById('formState').style.display = 'none';
        document.getElementById('successState').style.display = 'block';

        // Countdown and redirect
        let count = 3;
        const interval = setInterval(() => {
          count--;
          document.getElementById('countdown').textContent = count;
          if (count <= 0) {
            clearInterval(interval);
            window.location.href = '/index.html';
          }
        }, 1000);

      } catch (err) {
        showAlert('❌ Network error. Is the backend running?', 'error');
        btn.disabled = false;
        btn.innerHTML = 'Create Account';
      }
    }

    // Allow Enter key submit
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') doRegister();
    });

    // Redirect if already logged in
    if (localStorage.getItem('bank_token')) {
      window.location.href = '/index.html';
    }
  </script>
</body>

</html>
