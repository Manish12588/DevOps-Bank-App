<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — DevOps Bank</title>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #0a0f1e;
      --surface: #111827;
      --surface2: #1a2236;
      --border: #1f2d45;
      --accent: #3b82f6;
      --accent2: #10b981;
      --danger: #ef4444;
      --text: #e2e8f0;
      --muted: #64748b;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background-image: linear-gradient(rgba(59, 130, 246, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59, 130, 246, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    body::before {
      content: '';
      position: fixed;
      width: 400px;
      height: 400px;
      background: rgba(59, 130, 246, 0.06);
      top: -100px;
      left: -100px;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
    }

    .auth-container {
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 2rem;
      justify-content: center;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: var(--accent);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .logo-name {
      font-family: 'DM Serif Display', serif;
      font-size: 1.5rem;
      color: #fff;
      letter-spacing: -0.5px;
    }

    .logo-badge {
      font-size: 0.6rem;
      background: var(--accent);
      color: #fff;
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: 600;
      letter-spacing: 1px;
      margin-left: 4px;
      vertical-align: middle;
    }

    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
    }

    .auth-header {
      margin-bottom: 1.75rem;
      text-align: center;
    }

    .auth-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.6rem;
      color: #fff;
      margin-bottom: 0.25rem;
    }

    .auth-sub {
      font-size: 0.83rem;
      color: var(--muted);
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      margin-bottom: 1rem;
    }

    label {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .input-wrapper {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 0.9rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.9rem;
      pointer-events: none;
    }

    input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 0.65rem 0.9rem 0.65rem 2.4rem;
      font-size: 0.9rem;
      font-family: inherit;
      outline: none;
      transition: border 0.2s, box-shadow 0.2s;
      width: 100%;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    .alert {
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      display: none;
    }

    .alert.show {
      display: block;
    }

    .alert.error {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid var(--danger);
      color: var(--danger);
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    .btn-submit {
      width: 100%;
      padding: 0.75rem;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.92rem;
      font-weight: 600;
      background: var(--accent);
      color: #fff;
      transition: all 0.15s;
      margin-top: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .btn-submit:hover:not(:disabled) {
      background: #2563eb;
      transform: translateY(-1px);
      box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
    }

    .btn-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 1.25rem 0;
      color: var(--muted);
      font-size: 0.78rem;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .auth-footer {
      text-align: center;
      margin-top: 1.25rem;
      font-size: 0.85rem;
      color: var(--muted);
    }

    .auth-footer a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }

    .auth-footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <div class="auth-container">
    <div class="logo">
      <div class="logo-icon">🏦</div>
      <span class="logo-name">DevOps BANK<span class="logo-badge">DOCKER</span></span>
    </div>

    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-title">Welcome Back</div>
        <div class="auth-sub">Sign in to your account</div>
      </div>

      <div id="loginAlert" class="alert error"></div>

      <div class="form-group">
        <label>Email Address</label>
        <div class="input-wrapper">
          <span class="input-icon">✉️</span>
          <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="input-wrapper">
          <span class="input-icon">🔒</span>
          <input type="password" id="password" placeholder="Your password" autocomplete="current-password">
        </div>
      </div>

      <button class="btn-submit" id="submitBtn" onclick="doLogin()">
        Sign In
      </button>

      <div class="divider">or</div>

      <div class="auth-footer">
        Don't have an account? <a href="/register.html">Create one</a>
      </div>
    </div>
  </div>

  <script>
    async function doLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('submitBtn');
      const alert = document.getElementById('loginAlert');

      alert.classList.remove('show');

      if (!email || !password) {
        alert.textContent = '❌ Please enter your email and password';
        alert.classList.add('show');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<div class="spinner"></div> Signing in…';

      try {
        const r = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await r.json();

        if (!r.ok) {
          alert.textContent = '❌ ' + data.error;
          alert.classList.add('show');
          btn.disabled = false;
          btn.innerHTML = 'Sign In';
          return;
        }

        localStorage.setItem('bank_token', data.token);
        localStorage.setItem('bank_user', JSON.stringify(data.user));
        window.location.href = '/index.html';

      } catch (err) {
        alert.textContent = '❌ Network error. Is the backend running?';
        alert.classList.add('show');
        btn.disabled = false;
        btn.innerHTML = 'Sign In';
      }
    }

    document.addEventListener('keydown', (e) => { if (e.key === 'Enter') doLogin(); });

    // Redirect if already logged in
    if (localStorage.getItem('bank_token')) {
      window.location.href = '/index.html';
    }
  </script>
</body>

</html>
