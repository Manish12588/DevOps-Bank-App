grafana:
  adminPassword: admin123
  service:
    type: LoadBalancer
  sidecar:
    datasources:
      enabled: true
      defaultDatasourceEnabled: false  # disable built-in default
      label: grafana_datasource        # watch ConfigMaps with this label
      labelValue: "1"

prometheus:
  prometheusSpec:
    serviceMonitorSelectorNilUsesHelmValues: false
    retention: 15d
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: gp2
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi

alertmanager:
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: gp2
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 2Gi
