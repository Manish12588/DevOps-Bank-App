# ── Prometheus + Grafana + AlertManager values ────────────────────────────────

grafana:
  adminPassword: admin123
  service:
    type: LoadBalancer
  sidecar:
    datasources:
      defaultDatasourceEnabled: false    # ← fix duplicate default datasource

prometheus:
  prometheusSpec:
    serviceMonitorSelectorNilUsesHelmValues: false
    retention: 15d
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: gp2
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi

alertmanager:
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: gp2
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 2Gi
