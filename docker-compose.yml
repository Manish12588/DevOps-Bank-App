# ============================================================
# docker-compose.yml — Three-Tier Bank Application
# ============================================================
#
#  Tier 1 (Frontend) : Nginx serving HTML/CSS/JS  →  port 8080
#  Tier 2 (Backend)  : Node.js + Express REST API →  port 3000
#  Tier 3 (Database) : PostgreSQL 15              →  port 5432 (internal)
#  Tier 4 (Ollama)   : Ollama (llama 3.2)         →  port 11434
#
# All containers share the "bank-network" bridge network.
# DB data is persisted in the named volume "bank-pgdata".
# ============================================================

services:

  # ── Tier 4: Ollama AI Inference ──────────────────────────────────────────────
  ollama:
    image: ollama/ollama          # Official Ollama image from Docker Hub
    container_name: bank-ollama
    restart: unless-stopped

    volumes:
      # Named volume keeps downloaded models across restarts
      - ollama-data:/root/.ollama

    networks:
      - bank-network              # Same network → backend reaches it as "ollama:11434"

    # Ollama needs time to start before backend tries to call it
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
  # ── Tier 3: Database ─────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: bank-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: bankdb
      POSTGRES_USER: bankuser
      POSTGRES_PASSWORD: bankpass
    volumes:
      - bank-pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - bank-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bankuser -d bankdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Tier 2: Backend API ──────────────────────────────────────────────────────
  backend:
    image: ${DOCKERHUB_USER}/devops-bank-app-backend:${DOCKER_TAG}   # ← pull from DockerHub
    container_name: bank-backend
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: bankdb
      DB_USER: bankuser
      DB_PASSWORD: bankpass
      PORT: 3000
      NODE_ENV: production
      OLLAMA_MODEL: tinyllama
      OLLAMA_HOST: ollama
    ports:
      - "3000:3000"
    networks:
      - bank-network
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/health', r => process.exit(r.statusCode === 200 ? 0 : 1))\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── Tier 1: Frontend ─────────────────────────────────────────────────────────
  frontend:
    image: ${DOCKERHUB_USER}/devops-bank-app-frontend:${DOCKER_TAG}  # ← pull from DockerHub
    container_name: bank-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    networks:
      - bank-network
    depends_on:
      backend:
        condition: service_healthy

# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  bank-network:
    driver: bridge
    name: bank-network

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  bank-pgdata:
    name: bank-pgdata
  ollama-data:               
    name: ollama-data